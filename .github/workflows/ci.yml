name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openmugen .

      - name: Continuous Integration
        run: docker run -v $PWD:/app -w /app openmugen sh -c "make clean build"
